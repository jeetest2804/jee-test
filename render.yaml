services:
  - type: web
    name: jee-test-app
    env: node
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # Set this manually in Render dashboard
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
